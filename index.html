<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack</title>
    <style>
        :root { 
            --gold: #f1c40f; --table-green: #1a5e3a; --red: #e74c3c; 
            --dark-green: #0b2b1a; --ui-panel: rgba(0, 0, 0, 0.6);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--table-green); color: white; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: var(--ui-panel); padding: 20px; border-radius: 15px; margin: 15px auto; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-main { background: #2ecc71; color: white; box-shadow: 0 4px #27ae60; }
        .btn-banco { background: #3498db; color: white; box-shadow: 0 4px #2980b9; }
        .btn-danger { background: var(--red); color: white; box-shadow: 0 4px #c0392b; }
        .btn-win { background: #27ae60; color: white; }
        .btn-lose { background: var(--red); color: white; }
        .btn-bj { background: var(--gold); color: black; }
        
        input { padding: 12px; border-radius: 8px; border: none; margin: 10px; text-align: center; width: 80%; max-width: 300px; font-size: 1rem; background: rgba(255,255,255,0.9); color: black; }
        
        .chip { width: 60px; height: 60px; border-radius: 50%; border: 4px dashed white; display: inline-flex; align-items: center; justify-content: center; margin: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 rgba(0,0,0,0.3); transition: 0.1s; }
        .chip:active { transform: translateY(3px); box-shadow: none; }
        
        #win-display { font-size: 2.2rem; font-weight: 900; margin: 20px 0; text-shadow: 2px 2px 10px black; }
        .win-text { color: var(--gold); }
        .lose-text { color: var(--red); }
        .mossa-tag { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>🃏 BlackJack 🃏</h1>

    <div id="screen-home" class="card">
        <input type="text" id="user-name" placeholder="IL TUO NOME">
        <br>
        <button class="btn btn-main" onclick="creaStanza()">CREA STANZA (BANCO)</button>
        <hr style="opacity:0.2; margin: 20px;">
        <input type="number" id="join-id" placeholder="ID 4 CIFRE">
        <br>
        <button class="btn btn-banco" onclick="entraStanza()">ENTRA IN STANZA</button>
    </div>

    <div id="screen-banco" class="hidden">
        <div class="card">
            <h2>BANCO - Stanza: <span id="display-id-banco" style="color:var(--gold)"></span></h2>
            <button class="btn btn-danger" onclick="pulisciTavolo()">🧹 1. PULISCI TAVOLO</button>
            <button class="btn btn-main" onclick="apriPuntate()">💰 2. APRI PUNTATE</button>
        </div>
        <div id="lista-giocatori-banco"></div>
    </div>

    <div id="screen-giocatore" class="hidden">
        <div class="card">
            <h3><span id="my-display-name"></span> | Budget: <span id="my-money" style="color:var(--gold)">500</span>€</h3>
            <p>STATO: <b id="round-status">ATTESA</b></p>
        </div>
        
        <div id="win-display" class="hidden"></div>

        <div id="area-puntata" class="hidden">
            <div id="chips-container">
                <div class="chip" style="background:white; color:black" onclick="aggiungiPuntata(1)">1</div>
                <div class="chip" style="background:red" onclick="aggiungiPuntata(5)">5</div>
                <div class="chip" style="background:blue" onclick="aggiungiPuntata(10)">10</div>
                <div class="chip" style="background:green" onclick="aggiungiPuntata(20)">20</div>
                <div class="chip" style="background:orange" onclick="aggiungiPuntata(50)">50</div>
                <div class="chip" style="background:black" onclick="aggiungiPuntata(100)">100</div>
            </div>
            <h4>Puntata Corrente: <span id="current-bet">0</span>€</h4>
            <button class="btn btn-bj" onclick="doAllIn()">ALL-IN 🔥</button>
            <button class="btn btn-win" onclick="confermaPuntata()">CONFERMA PUNTATA ✅</button>
            <button class="btn btn-danger" style="font-size:0.7rem" onclick="resetPuntataLocal()">RESET</button>
        </div>

        <div id="area-wait" class="hidden card">
            <p>Puntata inviata: <b id="display-confirmed-bet">0</b>€</p>
            <button id="btn-raddoppia" class="btn btn-bj" onclick="doRaddoppia()">RADDOPPIA 2x</button>
            <button id="btn-assicura" class="btn btn-banco" onclick="doAssicurazione()">ASSICURAZIONE 🛡️</button>
            <p style="font-size: 0.8rem; opacity: 0.7;">Aspetta che il banco distribuisca o paghi.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAZIONE FIREBASE - Sostituisci con la tua
        const firebaseConfig = {
            apiKey: "AIzaSyAbVr_9KaVqly_rEBOrS1HeAvl6HuvgmrA",
            authDomain: "blackjackfish-322d3.firebaseapp.com",
            projectId: "blackjackfish-322d3",
            databaseURL: "https://blackjackfish-322d3-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "blackjackfish-322d3.firebasestorage.app",
            messagingSenderId: "1069692511591",
            appId: "1:1069692511591:web:8cc83e24c442dc49a43bc2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myID, currentStanza, wallet = 500, tempBet = 0, confirmedBet = 0;

        // --- BANCO ---
        window.creaStanza = function() {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            currentStanza = id;
            set(ref(db, 'stanze/' + id), { id: id, stato: 'ATTESA' });
            document.getElementById('display-id-banco').innerText = id;
            mostraSchermata('screen-banco');
            ascoltaGiocatori(id);
        }

        window.pulisciTavolo = async function() {
            await update(ref(db, `stanze/${currentStanza}`), { stato: 'RESET' });
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori`));
            const players = snap.val();
            if(players) {
                const updates = {};
                for(let p in players) {
                    updates[`stanze/${currentStanza}/giocatori/${p}/mossa`] = "Pronto";
                    updates[`stanze/${currentStanza}/giocatori/${p}/puntata`] = 0;
                    updates[`stanze/${currentStanza}/giocatori/${p}/ultimoPremio`] = 0;
                }
                await update(ref(db), updates);
            }
        }

        window.apriPuntate = function() {
            update(ref(db, `stanze/${currentStanza}`), { stato: 'PUNTATE' });
        }

        function ascoltaGiocatori(id) {
            onValue(ref(db, `stanze/${id}/giocatori`), (snap) => {
                const list = document.getElementById('lista-giocatori-banco');
                list.innerHTML = "";
                const data = snap.val();
                for(let p in data) {
                    list.innerHTML += `<div class="card">
                        <b>${data[p].nome}</b> (${data[p].fish}€)<br>
                        Punta: <b style="color:var(--gold)">${data[p].puntata}€</b><br>
                        Mossa: <span class="mossa-tag">${data[p].mossa}</span><br><br>
                        <button class="btn btn-win" onclick="paga('${p}',${data[p].puntata},'Vinto')">WIN</button>
                        <button class="btn btn-lose" onclick="paga('${p}',${data[p].puntata},'Perso')">LOSE</button>
                        <button class="btn btn-bj" onclick="paga('${p}',${data[p].puntata},'BJ')">BJ</button>
                    </div>`;
                }
            });
        }

        window.paga = async function(pID, pnt, esito) {
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori/${pID}`));
            const cur = snap.val().fish;
            const pntInt = parseInt(pnt);
            let finale, premio;

            if (esito === 'Vinto') {
                premio = pntInt;
                finale = cur + pntInt;
            } else if (esito === 'Perso') {
                premio = -pntInt;
                finale = cur - pntInt;
            } else if (esito === 'BJ') {
                // BJ: paga il doppio + metà del doppio (2.5x)
                premio = Math.floor(pntInt * 1.5); // Vinci 1.5x oltre alla puntata, totale 2.5x
                finale = cur + premio;
            }

            update(ref(db, `stanze/${currentStanza}/giocatori/${pID}`), { 
                fish: finale, mossa: "PAGATO", ultimoPremio: premio, puntata: 0 
            });
        }

        // --- GIOCATORE ---
        window.entraStanza = function() {
            const user = document.getElementById('user-name').value;
            currentStanza = document.getElementById('join-id').value;
            if(!user || !currentStanza) return alert("Metti nome e ID!");
            myID = user + "_" + Math.floor(Math.random()*99);
            set(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { 
                nome: user, fish: 500, puntata: 0, mossa: 'Entrato', ultimoPremio: 0 
            });
            document.getElementById('my-display-name').innerText = user;
            mostraSchermata('screen-giocatore');
            ascoltaStato(currentStanza);
        }

        function ascoltaStato(id) {
            onValue(ref(db, `stanze/${id}/stato`), (snap) => {
                const s = snap.val();
                document.getElementById('round-status').innerText = s;
                if(s === 'PUNTATE') {
                    document.getElementById('win-display').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                    document.getElementById('area-puntata').classList.remove('hidden');
                    tempBet = 0;
                    document.getElementById('current-bet').innerText = 0;
                    document.getElementById('btn-raddoppia').classList.remove('hidden');
                    document.getElementById('btn-assicura').classList.remove('hidden');
                } else if (s === 'RESET') {
                    document.getElementById('win-display').classList.add('hidden');
                    document.getElementById('area-puntata').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                }
            });

            onValue(ref(db, `stanze/${id}/giocatori/${myID}`), (snap) => {
                const d = snap.val();
                if(!d) return;
                wallet = d.fish;
                confirmedBet = d.puntata;
                document.getElementById('my-money').innerText = wallet;
                document.getElementById('display-confirmed-bet').innerText = confirmedBet;
                
                if(d.mossa === "PAGATO") {
                    const wd = document.getElementById('win-display');
                    wd.classList.remove('hidden');
                    const p = parseInt(d.ultimoPremio);
                    if (p > 0) {
                        // Vinto (o BJ)
                        wd.innerHTML = `<span class="win-text">VINTI: +${p}€</span>`;
                    } else if (p < 0) {
                        // Perso
                        wd.innerHTML = `<span class="lose-text">PERSO: ${p}€</span>`;
                    } else {
                        wd.innerHTML = `Puntata Rimborsata`;
                    }
                    document.getElementById('area-puntata').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                }
            });
        }

        window.aggiungiPuntata = (v) => { if(tempBet+v <= wallet) { tempBet+=v; document.getElementById('current-bet').innerText = tempBet; } };
        window.resetPuntataLocal = () => { tempBet = 0; document.getElementById('current-bet').innerText = 0; };
        
        window.doAllIn = () => { tempBet = wallet; document.getElementById('current-bet').innerText = tempBet; };

        window.confermaPuntata = function() {
            if(tempBet <= 0) return alert("Punta qualcosa!");
            update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: tempBet, mossa: 'In Gioco' });
            document.getElementById('area-puntata').classList.add('hidden');
            document.getElementById('area-wait').classList.remove('hidden');
        }

        window.doRaddoppia = function() {
            if(confirmedBet * 2 <= wallet) {
                const nuovaPuntata = confirmedBet * 2;
                update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: nuovaPuntata, mossa: 'RADDOPPIO 2x' });
                document.getElementById('btn-raddoppia').classList.add('hidden');
            } else { alert("Soldi insufficienti!"); }
        }

        window.doAssicurazione = function() {
            const extra = Math.floor(confirmedBet / 2);
            if(confirmedBet + extra <= wallet) {
                const nuovaPuntata = confirmedBet + extra;
                update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: nuovaPuntata, mossa: 'ASSICURAZIONE (+50%)' });
                document.getElementById('btn-assicura').classList.add('hidden');
            } else { alert("Soldi insufficienti!"); }
        }

        function mostraSchermata(id) {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-banco').classList.add('hidden');
            document.getElementById('screen-giocatore').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
