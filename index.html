<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack Online - Ultimate Edition</title>
    <style>
        :root { 
            --gold: #f1c40f; --table-green: #1a5e3a; --red: #e74c3c; 
            --dark-green: #0b2b1a; --ui-panel: rgba(0, 0, 0, 0.85);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--table-green); color: white; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Card & Layout */
        .card { background: var(--ui-panel); padding: 25px; border-radius: 20px; margin: 15px auto; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .hr-text { display: flex; align-items: center; margin: 30px 0; color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .hr-text::before, .hr-text::after { content: ""; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); margin: 0 15px; }

        /* Bottoni */
        .btn { padding: 14px 22px; margin: 8px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; display: inline-block; font-size: 0.9rem; letter-spacing: 1px; }
        .btn:active { transform: scale(0.92); }
        .btn-main { background: #2ecc71; color: white; box-shadow: 0 5px #27ae60; }
        .btn-banco { background: #3498db; color: white; box-shadow: 0 5px #2980b9; width: 100%; max-width: 320px; }
        .btn-danger { background: var(--red); color: white; box-shadow: 0 4px #c0392b; }
        .btn-win { background: #27ae60; color: white; }
        .btn-lose { background: var(--red); color: white; }
        .btn-bj { background: var(--gold); color: black; box-shadow: 0 5px #d4ac0d; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; }

        /* Input */
        input { padding: 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; margin: 8px; text-align: center; width: 85%; max-width: 300px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.5); }
        
        /* Money & Fiches */
        .btn-money { padding: 5px 10px; font-size: 0.7rem; margin: 3px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: #34495e; color: white; min-width: 45px; }
        .chip { width: 50px; height: 50px; border-radius: 50%; border: 3px dashed rgba(255,255,255,0.6); display: inline-flex; align-items: center; justify-content: center; margin: 5px; cursor: pointer; font-weight: 900; font-size: 0.85rem; box-shadow: 0 5px 0 rgba(0,0,0,0.3); transition: 0.1s; }
        .chip:active { transform: translateY(4px); box-shadow: none; }
        
        #win-display { font-size: 2.2rem; font-weight: 900; margin: 25px 0; text-transform: uppercase; }
        .win-text { color: var(--gold); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .lose-text { color: var(--red); }
        .mossa-tag { background: #34495e; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 4px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);">♠️ BLACKJACK LIVE ♦️</h1>

    <div id="screen-home" class="card">
        <div style="padding: 10px;">
            <button class="btn btn-bj" style="width: 100%; max-width: 320px;" onclick="creaStanza()">CREA STANZA (BANCO)</button>
        </div>

        <div class="hr-text">Per il Giocatore</div>

        <div>
            <input type="text" id="user-name" placeholder="INSERISCI IL TUO NOME">
            <br>
            <input type="number" id="join-id" placeholder="PIN STANZA (4 CIFRE)">
            <br>
            <button class="btn btn-main btn-banco" onclick="entraStanza()">ENTRA IN STANZA</button>
        </div>
    </div>

    <div id="screen-banco" class="hidden">
        <div class="card">
            <h2 style="margin:0">PIN: <span id="display-id-banco" style="color:var(--gold)">----</span></h2>
            <div style="margin-top:20px; display: flex; justify-content: center; gap: 10px;">
                <button class="btn btn-danger btn-sm" onclick="pulisciTavolo()">🧹 RESET</button>
                <button class="btn btn-main btn-sm" onclick="apriPuntate()">💰 APRI PUNTATE</button>
            </div>
        </div>
        <div id="lista-giocatori-banco"></div>
    </div>

    <div id="screen-giocatore" class="hidden">
        <div class="card">
            <h3 style="margin:0"><span id="my-display-name"></span></h3>
            <div style="font-size: 1.5rem; margin: 10px 0; color: var(--gold); font-weight: bold;">
                <span id="my-money">500</span>€
            </div>
            <p id="round-status" style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.6;">ATTESA</p>
        </div>
        
        <div id="win-display" class="hidden"></div>

        <div id="area-puntata" class="hidden card">
            <div id="chips-container">
                <div class="chip" style="background:#fff; color:#333" onclick="aggiungiPuntata(1)">1</div>
                <div class="chip" style="background:#e74c3c" onclick="aggiungiPuntata(5)">5</div>
                <div class="chip" style="background:#3498db" onclick="aggiungiPuntata(10)">10</div>
                <div class="chip" style="background:#2ecc71" onclick="aggiungiPuntata(25)">25</div>
                <div class="chip" style="background:#f39c12" onclick="aggiungiPuntata(50)">50</div>
                <div class="chip" style="background:#2c3e50" onclick="aggiungiPuntata(100)">100</div>
            </div>
            <h4 style="margin:20px 0;">Puntata Corrente: <span id="current-bet" style="color:var(--gold)">0</span>€</h4>
            <button class="btn btn-bj btn-sm" onclick="doAllIn()">ALL-IN 🔥</button>
            <button class="btn btn-main" style="width: 80%;" onclick="confermaPuntata()">CONFERMA ✅</button>
            <br>
            <button class="btn btn-danger btn-sm" style="margin-top:10px;" onclick="resetPuntataLocal()">RESET</button>
        </div>

        <div id="area-wait" class="hidden card">
            <p>Sei in gioco con: <b id="display-confirmed-bet" style="color:var(--gold)">0</b>€</p>
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px;">
                <button id="btn-raddoppia" class="btn btn-bj btn-sm" onclick="doRaddoppia()">RADDOPPIA 2x</button>
                <button id="btn-assicura" class="btn btn-banco btn-sm" onclick="doAssicurazione()">ASSICURAZIONE 🛡️</button>
                <button id="btn-split" class="btn btn-sm" style="background:#9b59b6; color:white" onclick="doSplit()">SPLITTA ✂️</button>
            </div>
            <p style="font-size: 0.75rem; opacity: 0.5; margin-top:20px;">Il banco sta decidendo il tuo destino...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAbVr_9KaVqly_rEBOrS1HeAvl6HuvgmrA",
            authDomain: "blackjackfish-322d3.firebaseapp.com",
            projectId: "blackjackfish-322d3",
            databaseURL: "https://blackjackfish-322d3-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "blackjackfish-322d3.firebasestorage.app",
            messagingSenderId: "1069692511591",
            appId: "1:1069692511591:web:8cc83e24c442dc49a43bc2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myID, currentStanza, wallet = 500, tempBet = 0, confirmedBet = 0;

        // --- BANCO ---
        window.creaStanza = function() {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            currentStanza = id;
            set(ref(db, 'stanze/' + id), { id: id, stato: 'ATTESA' });
            document.getElementById('display-id-banco').innerText = id;
            mostraSchermata('screen-banco');
            ascoltaGiocatori(id);
        }

        window.modificaSoldi = async function(pID, delta) {
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori/${pID}`));
            if(snap.exists()) {
                let n = snap.val().fish + delta;
                update(ref(db, `stanze/${currentStanza}/giocatori/${pID}`), { fish: n < 0 ? 0 : n });
            }
        }

        function ascoltaGiocatori(id) {
            onValue(ref(db, `stanze/${id}/giocatori`), (snap) => {
                const list = document.getElementById('lista-giocatori-banco');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return list.innerHTML = "<p style='opacity:0.4; margin-top:20px;'>Nessun pollastro collegato.</p>";

                for(let p in data) {
                    list.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--gold); text-align: left; padding: 15px;">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${data[p].nome}</b> <span class="mossa-tag">${data[p].mossa}</span>
                        </div>
                        <p style="margin: 10px 0;">Budget: <b style="color:var(--gold)">${data[p].fish}€</b> | Punta: <b>${data[p].puntata}€</b></p>
                        
                        <div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 12px;">
                            <span style="font-size:0.6rem; opacity:0.6; display:block; margin-bottom:5px;">CASSA RAPIDA (+/-)</span>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 1)">+1</button>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 5)">+5</button>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 10)">+10</button>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 25)">+25</button>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 50)">+50</button>
                            <button class="btn-money" onclick="modificaSoldi('${p}', 100)">+100</button>
                            <br>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -1)">-1</button>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -5)">-5</button>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -10)">-10</button>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -25)">-25</button>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -50)">-50</button>
                            <button class="btn-money" style="color:var(--red)" onclick="modificaSoldi('${p}', -100)">-100</button>
                        </div>

                        <div style="display:flex; gap:8px;">
                            <button class="btn btn-win btn-sm" style="flex:1" onclick="paga('${p}',${data[p].puntata},'Vinto')">WIN</button>
                            <button class="btn btn-lose btn-sm" style="flex:1" onclick="paga('${p}',${data[p].puntata},'Perso')">LOSE</button>
                            <button class="btn btn-bj btn-sm" style="flex:1" onclick="paga('${p}',${data[p].puntata},'BJ')">BJ</button>
                        </div>
                    </div>`;
                }
            });
        }

        window.paga = async function(pID, pnt, esito) {
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori/${pID}`));
            if(!snap.exists()) return;
            const cur = snap.val().fish;
            const pntInt = parseInt(pnt);
            let finale, premio, mossaTesto;

            if (esito === 'Vinto') { premio = pntInt; finale = cur + pntInt; mossaTesto = `Pagato (+${premio}€)`; }
            else if (esito === 'Perso') { premio = -pntInt; finale = cur - pntInt; mossaTesto = `Perso (-${pntInt}€)`; }
            else if (esito === 'BJ') { premio = Math.floor(pntInt * 1.5); finale = cur + premio; mossaTesto = `Pagato BJ (+${premio}€)`; }

            update(ref(db, `stanze/${currentStanza}/giocatori/${pID}`), { 
                fish: finale, mossa: mossaTesto, ultimoPremio: premio, puntata: 0 
            });
        }

        window.pulisciTavolo = () => update(ref(db, `stanze/${currentStanza}`), { stato: 'RESET' });
        window.apriPuntate = () => update(ref(db, `stanze/${currentStanza}`), { stato: 'PUNTATE' });

        // --- GIOCATORE ---
        window.entraStanza = function() {
            const user = document.getElementById('user-name').value;
            currentStanza = document.getElementById('join-id').value;
            if(!user || !currentStanza) return alert("Hey Kevin! Nome e PIN sono obbligatori.");

            myID = user + "_" + Math.floor(Math.random()*99);
            const userRef = ref(db, `stanze/${currentStanza}/giocatori/${myID}`);
            onDisconnect(userRef).remove();

            set(userRef, { nome: user, fish: 500, puntata: 0, mossa: 'Entrato', ultimoPremio: 0 });
            document.getElementById('my-display-name').innerText = user;
            mostraSchermata('screen-giocatore');
            ascoltaStato(currentStanza);
        }

        function ascoltaStato(id) {
            onValue(ref(db, `stanze/${id}/stato`), (snap) => {
                const s = snap.val();
                document.getElementById('round-status').innerText = "STATO: " + s;
                if(s === 'PUNTATE') {
                    document.getElementById('win-display').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                    document.getElementById('area-puntata').classList.remove('hidden');
                    document.getElementById('btn-assicura').classList.remove('hidden');
                    document.getElementById('btn-split').classList.remove('hidden');
                    document.getElementById('btn-raddoppia').classList.remove('hidden');
                    tempBet = 0; document.getElementById('current-bet').innerText = 0;
                } else if (s === 'RESET') {
                    document.getElementById('win-display').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                    document.getElementById('area-puntata').classList.add('hidden');
                }
            });

            onValue(ref(db, `stanze/${id}/giocatori/${myID}`), (snap) => {
                const d = snap.val(); if(!d) return;
                wallet = d.fish; confirmedBet = d.puntata;
                document.getElementById('my-money').innerText = wallet;
                document.getElementById('display-confirmed-bet').innerText = confirmedBet;
                
                if(d.mossa.includes("Pagato") || d.mossa.includes("Perso")) {
                    const wd = document.getElementById('win-display');
                    wd.classList.remove('hidden');
                    const p = parseInt(d.ultimoPremio);
                    wd.innerHTML = p > 0 ? `<span class="win-text">HAI VINTO: +${p}€! 🍀</span>` : `<span class="lose-text">HAI PERSO: ${p}€ 💀</span>`;
                    document.getElementById('area-puntata').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                }
            });
        }

        window.aggiungiPuntata = (v) => { if(tempBet+v <= wallet) { tempBet+=v; document.getElementById('current-bet').innerText = tempBet; } };
        window.doAllIn = () => { tempBet = wallet; document.getElementById('current-bet').innerText = tempBet; };
        window.resetPuntataLocal = () => { tempBet = 0; document.getElementById('current-bet').innerText = 0; };
        
        window.confermaPuntata = () => {
            if(tempBet <= 0) return alert("Punta qualcosa o vai a casa!");
            update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: tempBet, mossa: 'In Gioco' });
            document.getElementById('area-puntata').classList.add('hidden');
            document.getElementById('area-wait').classList.remove('hidden');
        };

        window.doRaddoppia = () => {
            if(confirmedBet * 2 <= wallet) {
                update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: confirmedBet * 2, mossa: 'RADDOPPIO 🔥' });
                document.getElementById('btn-raddoppia').classList.add('hidden');
            } else alert("Niente soldi, niente raddoppio.");
        };

        window.doAssicurazione = () => {
            const extra = Math.floor(confirmedBet / 2);
            if(confirmedBet + extra <= wallet) {
                update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: confirmedBet + extra, mossa: 'ASSICURAZIONE 🛡️' });
                document.getElementById('btn-assicura').classList.add('hidden');
            }
        };

        window.doSplit = () => {
            if(confirmedBet * 2 <= wallet) {
                update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: confirmedBet * 2, mossa: 'SPLIT ✂️' });
                document.getElementById('btn-split').classList.add('hidden');
            }
        };

        function mostraSchermata(id) {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-banco').classList.add('hidden');
            document.getElementById('screen-giocatore').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
