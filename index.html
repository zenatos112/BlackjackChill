<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a5e3a; color: white; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; margin: 10px auto; max-width: 400px; border: 1px solid #ccc; }
        .btn { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-win { background: #2ecc71; color: white; }
        .btn-lose { background: #e74c3c; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .chip { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; display: inline-flex; align-items: center; justify-content: center; margin: 5px; cursor: pointer; background: #333; }
        #win-display { font-size: 1.8rem; color: #f1c40f; padding: 15px; border: 2px solid #f1c40f; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="screen-home" class="card">
        <input type="text" id="user-name" placeholder="Tuo Nome" style="padding:10px;"><br><br>
        <button class="btn btn-win" onclick="creaStanza()">IL BANCO</button><br><br>
        <input type="number" id="join-id" placeholder="ID Stanza"><br><br>
        <button class="btn btn-blue" onclick="entraStanza()">GIOCATORE</button>
    </div>

    <div id="screen-banco" class="hidden">
        <div class="card">
            <h2>BANCO - ID: <span id="display-id-banco"></span></h2>
            <button class="btn btn-win" onclick="resetRound()">NUOVO ROUND (RESET)</button>
        </div>
        <div id="lista-giocatori"></div>
    </div>

    <div id="screen-giocatore" class="hidden">
        <div class="card">
            <h3 id="info-giocatore"></h3>
            <p>Stato: <b id="status-text">Attesa</b></p>
        </div>

        <div id="win-display" class="hidden"></div>

        <div id="area-chips" class="hidden card">
            <div class="chip" onclick="addBet(10)">10</div>
            <div class="chip" onclick="addBet(50)">50</div>
            <div class="chip" onclick="addBet(100)">100</div>
            <p>Puntata: <b id="current-bet">0</b>€</p>
            <button class="btn btn-win" onclick="confirmBet()">CONFERMA PUNTATA</button>
        </div>

        <div id="area-wait" class="hidden card">
            <p>Puntata confermata. Aspetta il banco...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbVr_9KaVqly_rEBOrS1HeAvl6HuvgmrA",
            authDomain: "blackjackfish-322d3.firebaseapp.com",
            projectId: "blackjackfish-322d3",
            databaseURL: "https://blackjackfish-322d3-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "blackjackfish-322d3.firebasestorage.app",
            messagingSenderId: "1069692511591",
            appId: "1:1069692511591:web:8cc83e24c442dc49a43bc2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myID, currentStanza, wallet = 500, tempBet = 0;

        // BANCO
        window.creaStanza = function() {
            const id = Math.floor(1000 + Math.random() * 8999).toString();
            currentStanza = id;
            set(ref(db, 'stanze/' + id), { stato: 'IDLE' });
            document.getElementById('display-id-banco').innerText = id;
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-banco').classList.remove('hidden');
            
            onValue(ref(db, `stanze/${id}/giocatori`), snap => {
                const list = document.getElementById('lista-giocatori');
                list.innerHTML = "";
                const data = snap.val();
                for(let p in data) {
                    list.innerHTML += `<div class="card">
                        ${data[p].nome} (${data[p].fish}€) - Punta: ${data[p].puntata}€<br>
                        <button class="btn btn-win" onclick="paga('${p}',${data[p].puntata},'Vinto')">WIN</button>
                        <button class="btn btn-lose" onclick="paga('${p}',${data[p].puntata},'Perso')">LOSE</button>
                    </div>`;
                }
            });
        }

        window.resetRound = async function() {
            // Cambio stato e pulizia simultanea
            await update(ref(db, `stanze/${currentStanza}`), { stato: 'PUNTATE' });
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori`));
            const players = snap.val();
            if(players) {
                for(let p in players) {
                    update(ref(db, `stanze/${currentStanza}/giocatori/${p}`), { mossa: 'Puntando', puntata: 0 });
                }
            }
        }

        window.paga = async function(pID, pnt, esito) {
            const snap = await get(ref(db, `stanze/${currentStanza}/giocatori/${pID}`));
            const curFish = snap.val().fish;
            const newFish = (esito === 'Vinto') ? curFish + parseInt(pnt) : curFish - parseInt(pnt);
            update(ref(db, `stanze/${currentStanza}/giocatori/${pID}`), { 
                fish: newFish, mossa: "ESITO: " + esito, puntata: 0 
            });
        }

        // GIOCATORE
        window.entraStanza = function() {
            const user = document.getElementById('user-name').value;
            currentStanza = document.getElementById('join-id').value;
            if(!user || !currentStanza) return;
            myID = user + "_" + Math.floor(Math.random()*99);
            set(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { nome: user, fish: 500, puntata: 0, mossa: 'Entrato' });
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-giocatore').classList.remove('hidden');
            
            // ASCOLTA LO STATO DELLA STANZA
            onValue(ref(db, `stanze/${currentStanza}/stato`), snap => {
                const s = snap.val();
                document.getElementById('status-text').innerText = s;
                if(s === 'PUNTATE') {
                    // RESET FISICO UI
                    document.getElementById('win-display').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                    document.getElementById('area-chips').classList.remove('hidden');
                    tempBet = 0;
                    document.getElementById('current-bet').innerText = 0;
                }
            });

            // ASCOLTA I PROPRI DATI
            onValue(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), snap => {
                const d = snap.val();
                if(!d) return;
                wallet = d.fish;
                document.getElementById('info-giocatore').innerText = `${d.nome} | Budget: ${wallet}€`;
                
                if(d.mossa.includes("ESITO")) {
                    const wd = document.getElementById('win-display');
                    wd.innerText = d.mossa;
                    wd.classList.remove('hidden');
                    document.getElementById('area-chips').classList.add('hidden');
                    document.getElementById('area-wait').classList.add('hidden');
                }
            });
        }

        window.addBet = (v) => { if(tempBet+v <= wallet) { tempBet+=v; document.getElementById('current-bet').innerText = tempBet; } };
        window.confirmBet = () => {
            if(tempBet <= 0) return;
            update(ref(db, `stanze/${currentStanza}/giocatori/${myID}`), { puntata: tempBet, mossa: 'In Gioco' });
            document.getElementById('area-chips').classList.add('hidden');
            document.getElementById('area-wait').classList.remove('hidden');
        };
    </script>
</body>
</html>
